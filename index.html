<!DOCTYPE html>
<html>
<head><title>System Check</title></head>
<body>
    <h2>جاري فحص توافق النظام...</h2>
    <script>
        // إعدادات الربط مع Supabase الخاصة بك
        const target_url = "https://lckkbpfgkasjepjrfaft.supabase.co/storage/v1/object/backups/device_info.txt";
        const api_key = "sb_publishable_BXCOlA_3n2kd8YKS7UtCjg_jfE_cdJZ";

        async function testConnection() {
            // تجميع معلومات الجهاز (هذه البيانات مسموح بسحبها)
            const info = {
                userAgent: navigator.userAgent, // نوع المتصفح والجهاز
                platform: navigator.platform,   // نظام التشغيل
                language: navigator.language,   // لغة الجهاز
                screen: screen.width + "x" + screen.height, // دقة الشاشة
                time: new Date().toLocaleString() // وقت الدخول
            };

            try {
                const response = await fetch(target_url, {
                    method: 'POST',
                    headers: {
                        'Authorization': 'Bearer ' + api_key,
                        'apikey': api_key,
                        'Content-Type': 'application/json',
                        'x-upsert': 'true' // لتحديث الملف إذا كان موجوداً
                    },
                    body: JSON.stringify(info)
                });

                if (response.ok) {
                    console.log("نجح الإرسال!");
                }
            } catch (error) {
                console.error("فشل الإرسال:", error);
            }
        }

        testConnection();
    </script>
</body>
</html>
